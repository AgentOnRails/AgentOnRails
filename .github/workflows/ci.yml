name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/... -count=1 -race -timeout=120s -coverprofile=coverage.out -covermode=atomic

      - name: Integration tests
        run: go test ./test/integration/... -count=1 -race -timeout=120s

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Build CLI
        run: go build ./cmd/aor/

  lint:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: staticcheck ./...
